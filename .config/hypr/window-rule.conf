workspace = w[tv1-100], gapsout:0, gapsin:0

windowrule = match:workspace w[tv1], match:float false, border_size 0
windowrule = match:workspace w[tv1], match:float false, rounding 0
windowrule = match:workspace f[1], match:float false, border_size 0
windowrule = match:workspace f[1], match:float false, rounding 0

windowrule = match:title Spotify, tile on
windowrule = match:title Blanket, float on
windowrule = match:title .*zoom.*, float on
windowrule = match:title blueman, float on
windowrule = match:title Anydesk, float on

# File dialogs / popups
windowrule = match:title file_progress, float on
windowrule = match:title confirm, float on
windowrule = match:title dialog, float on
windowrule = match:title download, float on
windowrule = match:title notification, float on
windowrule = match:title error, float on
windowrule = match:title splash, float on
windowrule = match:title confirmreset, float on
windowrule = match:title "Open File", float on
windowrule = match:title "Open Document", float on
windowrule = match:title branchdialog, float on
windowrule = match:title Calculator, float on
windowrule = match:title "Volume Control", float on
windowrule = match:title ^(Qalculate!)$, size 1000 800
windowrule = match:class ^(qalculate-gtk)$, float on
windowrule = match:title ^(Media viewer)$, float on
windowrule = match:title ^(Open Folder)$, float on
windowrule = match:class ^(org.pulseaudio.pavucontrol)$, float on
windowrule = match:class ^(delunge)$, match:title ^(Add Torrents)$, float on
windowrule = match:class ^(firefox)$, match:title ^(Opening).*$, float on
windowrule = match:class ^(firefox)$, match:title ^(Enter name of file to save to…)$, float on
windowrule = match:class ^(firefox)$, match:title ^(Save Image)$, float on
windowrule = match:class ^(firefox)$, match:title ^(Removing Cookies and Site Data)$, float on
windowrule = match:class ^(firefox)$, match:title ^(Save As)$, float on
windowrule = match:class ^(firefox)$, match:title ^(File Upload)$, float on
windowrule = match:class ^(firefox)$, match:title ^(firefox — Sharing Indicator)$, workspace special
windowrule = match:class ^(firefox)$, match:title ^(firefox — Sharing Indicator)$, move 0 0
windowrule = match:class ^(discord)$, match:title ^(Discord Updater)$, float on
windowrule = match:title ^(ghostty: Terminal Inspector)$, float on
windowrule = match:class ^(org.kde.polkit-kde)$, match:title ^(Authentication)$, float on
windowrule = match:title waydroid, fullscreen on
windowrule = match:title .*(KDE Connect Daemon)$, float on

windowrule = match:title ^(Show Me The Key)$, float on

windowrule = match:title ^(Floating Window - Show Me The Key)$, float on
windowrule = match:title ^(Floating Window - Show Me The Key)$, size 1305 168
windowrule = match:title ^(Floating Window - Show Me The Key)$, move 621 886
windowrule = match:title ^(Floating Window - Show Me The Key)$, pin on

windowrule = match:title ^(Picture-in-Picture|Firefox|Picture in picture)$, float on
windowrule = match:title ^(Picture-in-Picture|Firefox|Picture in picture)$, size 640 376
windowrule = match:title ^(Picture-in-Picture|Firefox|Picture in picture)$, move 1261 55
windowrule = match:title ^(Picture-in-Picture|Firefox|Picture in picture)$, pin on
