#####################################
# Essentials & Performance
#####################################
vo=gpu
hwdec=auto-safe
gpu-api=opengl
profile=gpu-hq

#####################################
# Playback & UI Behavior
#####################################
save-position-on-quit=yes
keep-open=yes
autofit-larger=80%x80%

#####################################
# Video Quality & Smoothness
#####################################
interpolation=yes
tscale=oversample
video-sync=display-resample

#####################################
# Audio Settings
#####################################
volume=100
volume-max=200

#####################################
# Subtitle Settings
#####################################
slang=en,eng
alang=en,eng
sub-auto=fuzzy
sub-font-size=50

#####################################
# Screenshot Settings
#####################################
screenshot-directory=~/Pictures/mpv-screenshots/
# screenshot-format=png
# screenshot-png-compression=7
# screenshot-template=%F-%wH-%wM-%wS-%wT

#####################################
# Network & Cache (Optional)
#####################################
# cache=yes
# demuxer-max-bytes=150M
# demuxer-max-back-bytes=75M
# ytdl-format=bestvideo[height<=?1080]+bestaudio/best

